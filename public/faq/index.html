<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ – EMS | European Mining Summit 2026</title>
  <meta name="description" content="Frequently Asked Questions about the European Mining Summit 2026 in Helsinki, Finland." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .embed-section {
      min-height: 80vh;
      padding: 120px 0 60px;
      background: var(--navy);
    }
    .embed-wrapper {
      position: relative;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
      box-sizing: border-box;
    }
    .embed-ratio {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      overflow: hidden;
      border-radius: var(--radius-lg);
    }
    .embed-ratio iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <div class="container nav__inner">
      <a href="/" class="nav__logo">
        <img src="/ems-logo.svg" alt="EMS" class="nav__logo-img" />
      </a>
      <ul class="nav__links" id="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/faq" class="btn btn--sm btn--outline">FAQ</a></li>
        <li><a href="/deck" class="btn btn--sm btn--outline">Pitch Deck</a></li>
        <li><a href="https://satlantis.io/events/1805/European-Mining-Summit-2026" target="_blank" rel="noopener" class="btn btn--sm btn--accent">Get Your Tickets</a></li>
      </ul>
      <button class="nav__toggle" id="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Embed Section -->
  <section class="embed-section">
    <div style="
      position: relative;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
      box-sizing: border-box;
    ">
      <div style="
        position: relative;
        width: 100%;
        padding-top: 56.25%; /* 16:9 ratio — adjust if your Canva design is different */
        overflow: hidden;
      ">
        <iframe
          src="https://www.canva.com/design/DAHC_PNO608/wBUbgp4yD5_YDbwAMsnc9A/view?embed"
          style="
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
          "
          allowfullscreen
          loading="lazy"
        ></iframe>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__brand">
        <img src="/ems-logo.svg" alt="EMS" class="footer__logo-img" />
      </div>
      <p class="footer__info">23 September 2026 · Helsinki, Finland</p>
      <div class="footer__links">
        <a href="/faq" class="btn btn--sm btn--outline">FAQ</a>
        <a href="/deck" class="btn btn--sm btn--outline">Pitch Deck</a>
      </div>
      <p class="footer__copy">&copy; 2026 European Mining Summit. All rights reserved.</p>
      <div class="footer__organizer">
        <a href="https://btchel.com" target="_blank" rel="noopener"><img src="/sponsors/btchel.png" alt="BTC HEL" class="footer__btchel-logo" /></a>
        <p class="footer__organizer-text">Event organized by the professional BTC HEL Crew. In co-operation with EBEA.</p>
      </div>
    </div>
  </footer>

  <script>
    // Navbar scroll effect
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('nav--scrolled', window.scrollY > 40);
    });
    // Mobile nav toggle
    const navToggle = document.getElementById('nav-toggle');
    const navLinks = document.getElementById('nav-links');
    navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => navLinks.classList.remove('open'));
    });
  </script>
</body>
</html>
